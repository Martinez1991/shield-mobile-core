name: native

# LLVM native-svc build + execution gates (issue #82/#64, ADR 0004). Installs
# LLVM 18, Clang and qemu-user, builds the out-of-tree native-svc, and runs the
# gates: passes stay functionally identical (host), the end-to-end lib flow builds
# an arm64 Android .so, and the protected arm64 binary executes identically under
# qemu-user. Kept separate from the fast Go checks since it provisions toolchains.

on:
  push:
    branches: [main]
    paths:
      - 'native-svc/**'
      - '.github/workflows/native.yml'
  pull_request:
    paths:
      - 'native-svc/**'
      - '.github/workflows/native.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-gate:
    name: build + execution gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 toolchain + arm64 cross + qemu-user
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18-dev clang-18 cmake ninja-build \
            build-essential zlib1g-dev libzstd-dev libtinfo-dev libedit-dev \
            gcc-aarch64-linux-gnu libc6-dev-arm64-cross qemu-user-static

      - name: Configure
        run: cmake -S native-svc -B native-svc/build -G Ninja
             -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm

      - name: Build
        run: cmake --build native-svc/build

      - name: Execution gate (passes stay functionally identical)
        run: bash native-svc/test/gate.sh

      - name: End-to-end native-lib gate (host run + arm64 Android build)
        # ANDROID_NDK_LATEST_HOME is preset on the runner; ndk-gate.sh reads it.
        run: bash native-svc/test/ndk-gate.sh

      - name: arm64 execution gate (protected arm64 runs identically, under qemu)
        run: bash native-svc/test/arm64-exec-gate.sh
