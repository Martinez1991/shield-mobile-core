name: docker

# Build the SHIELD CLI image. On PRs it builds + smoke-tests the image (no push);
# on main and version tags it publishes to GHCR (ghcr.io/<owner>/shield-mobile-core).

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'cmd/**'
      - 'engine/**'
      - 'policy/**'
      - 'obs/**'
      - 'internal/**'
      - 'go.mod'
      - 'action.yml'
      - '.github/workflows/docker.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'cmd/**'
      - 'go.mod'
      - 'action.yml'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: build (+ push on main/tags)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha

      - name: Build (load on PR, push otherwise)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the built image
        if: github.event_name == 'pull_request'
        run: |
          img=$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -1)
          echo "running: $img version"
          docker run --rm "$img" version
