name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: gofmt (fail on diff)
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt needed on:"; echo "$diff"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...

  fuzz-corpus:
    name: fuzz corpus (deterministic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      # Run the fuzz seed corpora as regular tests: deterministic and fast (~2s),
      # catching crashes/regressions on known inputs without the wall-clock
      # "-fuzz" run that flaked with "context deadline exceeded" on slow runners.
      # Continuous fuzzing (finding new inputs) runs nightly in fuzz-nightly.yml.
      - name: fuzz seed corpora (regression run)
        run: |
          go test ./engine -run '^Fuzz' -count=1
          go test ./internal/manifest -run '^FuzzKeepClasses$' -count=1

  vuln:
    name: govulncheck (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  secret-scan:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
